<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск группы</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --green: #16a34a;
            --green-dark: #15803d;

            --red: #dc2626;
            --red-dark: #b91c1c;

            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;

            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        /* Navbar */
        .navbar {
            background: rgba(30, 41, 59, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .navbar-brand {
            font-weight: 600;
        }

        /* Кнопки */
        .btn-green {
            background: var(--green);
            color: white;
            border: none;
        }

        .btn-green:hover {
            background: var(--green-dark);
        }

        .btn-red {
            background: var(--red);
            color: white;
            border: none;
        }

        .btn-red:hover {
            background: var(--red-dark);
        }

        .btn-outline-light {
            border-color: var(--border);
            color: var(--text);
        }

        .btn-outline-light:hover {
            background: var(--card);
        }

        /* Карточки */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Формы */
        .form-control {
            background: #020617;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .form-control:focus {
            border-color: var(--green);
            box-shadow: none;
        }

        /* Текст */
        .text-muted {
            color: var(--muted) !important;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🚀 Поиск группы</a>

        <div class="ms-auto d-flex align-items-center">
            {% if user.is_authenticated %}
                <span class="me-3 text-muted">
                    {{ user.get_full_name|default:user.username }}
                </span>

                <a href="{% url 'create_announcement' %}" class="btn btn-green btn-sm me-2">
                    + Объявление
                </a>

                <a href="{% url 'profile' %}" class="btn btn-outline-light btn-sm me-2">
                    Профиль
                </a>

                <a href="{% url 'logout' %}" class="btn btn-red btn-sm">
                    Выйти
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-green btn-sm me-2">
                    Войти
                </a>

                <a href="{% url 'register' %}" class="btn btn-outline-light btn-sm">
                    Регистрация
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container mt-4">
    {% block content %}{% endblock %}
</main>

</body>
</html>

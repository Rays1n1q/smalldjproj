{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Мои объявления</h2>

{% for ann in announcements %}
<div class="card mb-3">
    <div class="card-body">
        <h5>{{ ann.title }}</h5>
        <p class="text-muted">{{ ann.description|truncatewords:50 }}</p>
        <small class="text-primary">Откликов: <strong>{{ ann.responses.count }}</strong></small>
        
        <div class="mt-3">
            <a href="{% url 'announcement_detail' ann.pk %}" class="btn btn-primary btn-sm">Открыть</a>
            <a href="{% url 'edit_announcement' ann.pk %}" class="btn btn-warning btn-sm">✏️ Редактировать</a>
            <a href="{% url 'delete_announcement' ann.pk %}" 
               class="btn btn-danger btn-sm"
               onclick="return confirm('Удалить объявление?')">Удалить</a>
        </div>
    </div>
</div>
{% empty %}
<div class="alert alert-info">
    У вас пока нет объявлений.
</div>
{% endfor %}
{% endblock %}

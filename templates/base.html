{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск группf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Поиск группы</a>
        
        <div class="ms-auto">
            {% if user.is_authenticated %}
                <span class="text-white me-3">Привет, {{ user.get_full_name|default:user.username }}!</span>
                <a href="{% url 'create_announcement' %}" class="btn btn-light btn-sm me-2">+ Объявление</a>
                <a href="{% url 'profile' %}" class="btn btn-light btn-sm me-2">Профиль</a>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Выйти</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-light btn-sm me-2">Войти</a>
                <a href="{% url 'register' %}" class="btn btn-outline-light btn-sm">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>

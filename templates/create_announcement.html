{% extends 'base.html' %}
{% block content %}
<h2>Новое объявление</h2>
<form method="post">
    {% csrf_token %}
    <input type="text" name="title" class="form-control mb-3" placeholder="Заголовок" required>
    <textarea name="description" class="form-control mb-3" rows="5" placeholder="Описание" required></textarea>
    <button type="submit" class="btn btn-success">Опубликовать</button>
</form>
{% endblock %}
